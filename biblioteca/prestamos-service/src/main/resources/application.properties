server.port=8083
spring.application.name=prestamos-service

spring.datasource.url=jdbc:h2:mem:prestamosdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# URLs for inter-service communication
usuarios.service.url=http://localhost:8081/biblioteca/usuarios
catalogo.service.url=http://localhost:8082/biblioteca/libros
